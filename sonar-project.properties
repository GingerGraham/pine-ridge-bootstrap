# SonarQube Configuration for Pine Ridge Bootstrap

# Project identification
sonar.projectKey=pine-ridge-bootstrap
sonar.projectName=Pine Ridge Bootstrap
sonar.projectVersion=1.0

# Source code location
sonar.sources=bin,pine-ridge-podman,pine-ridge-waf,templates
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/*.log,**/*.tmp,**/*.bak

# Test coverage (if tests are added in the future)
# sonar.tests=tests
# sonar.testExecutionReportPaths=coverage/test-report.xml

# Language-specific settings
sonar.lang.patterns.sh=**/*.sh

# Quality profiles
# Use default quality profiles for each language

# Additional settings
sonar.scm.provider=git
